<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/x-icon" href="./assets/img/volumen-16x16.png" />
    <title> Narraciones Open AI </title>
    
    <link rel="stylesheet" href="./assets/css/styles.css">
    <script type="module" src="./assets/js/main.js"> </script>

</head>

<body>

    <div class="layout">


        <header class="layout__header-project">

            <h1 class="header__title-project">
                Desarrollo Web con IA
            </h1>

            <div class="header__tech-stack">
                
                <div class="tech-item">
                    <img src="./assets/img/openai-platform.svg" alt="OpenAI" class="tech-icon">
                    <span class="tech-name"> OpenAI </span>
                </div>
                
                <div class="tech-item">
                    <img src="./assets/img/deepseek.png" alt="DeepSeek" class="tech-icon">
                    <span class="tech-name"> DeepSeek </span>
                </div>

                <div class="tech-item tech-item--separator">
                    <!--  -----  Separador  -----  -->  
                </div>
                
                <div class="tech-item">
                    <img src="./assets/img/javascript.svg" alt="JavaScript" class="tech-icon">
                    <span class="tech-name"> JavaScript </span>
                </div>
                
                <div class="tech-item">
                    <img src="./assets/img/nodejs-icon.ico" alt="NodeJS" class="tech-icon">
                    <span class="tech-name"> NodeJS </span>
                </div>

                <div class="tech-item">
                    <img src="./assets/img/express.png" alt="Express" class="tech-icon">
                    <span class="tech-name"> Express </span>
                </div>

                <div class="tech-item tech-item--separator">
                    <!--  -----  Separador  -----  -->  
                </div>

                <div class="tech-item">
                    <img src="./assets/img/github.svg" alt="GitHub" class="tech-icon">
                    <span class="tech-name"> GitHub </span>

                </div>

        </div>

    </header>



    <div class="layout__chat">


        <!--  ----  Header  -----   -->
        <header class="chat__header">

            <img 
                class="header__icon" 
                src="./assets/img/volumen-40x40.avif"
                alt="Ícono de Narraciones" width="40" height="40"
            >

            <h2 class="header__title">
                Narrador de Textos
            </h2>

        </header>


        <!--  ----  Main  -----   -->
        <main class="chat__main">

            <!--  -----  Mensajes del Chat  -----  -->
            <div class="chat__messages">
                <!--  *****  Cargar los Mensajes  *****  -->
            </div>

            <!--  -----  Inputs del Chat  -----  -->
            <div class="chat__input-group">

                <input 
                    type="text" 
                    class="chat__input-text" 
                    id="inputText" 
                    placeholder="Que texto quieres narrar?"
                />

                <div class="chat__inputs">
                   
                     <!--  -----  Input de Texto  -----  -->
                    <select class="chat__select" id="targetSpeaker">
                        <option value="alloy"> Alloy </option>
                        <option value="echo"> Echo </option>
                        <option value="fable"> Fable </option>
                        <option value="nova"> Nova </option>
                        <option value="onyx"> Onyx </option>
                        <option value="shimmer"> Shimmer </option>
                    </select>

                    <!--  -----  Botón de Respuesta  -----  -->
                    <button class="chat__button" id="sendButton"> 
                        Narrar Texto 
                    </button>

                </div>


            </div>

        </main>

    </div>



    </div>

    
</body>

</html>
